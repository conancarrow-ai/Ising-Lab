<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ising Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; user-select: none; background: #f5f5f0; }
    canvas { display: block; }

    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font: 12px/1.6 monospace;
      padding: 10px 14px;
      border-radius: 4px;
      pointer-events: none;
    }

    #legend strong {
      color: #ff9944;
    }

    .mode-active {
      color: #ff6600;
    }

    #controls {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font: 12px/1.6 monospace;
      padding: 8px 12px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #color-count {
      font: 12px monospace;
      padding: 2px 4px;
      border-radius: 3px;
      border: 1px solid #888;
      background: #333;
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <label for="color-count">Colors:</label>
    <select id="color-count">
      <option value="2" selected>2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
    </select>
  </div>
  <div id="legend">
    <strong>Modes</strong><br>
    <span data-mode="NEW_NODE">1 — Place</span><br>
    <span data-mode="LASSO_SELECT">2 — Lasso</span><br>
    <span data-mode="CLICK_SELECT">3 — Select</span><br>
    <br>
    <strong>Actions</strong><br>
    q — Color<br>
    w — Connect<br>
    e — Hide<br>
    r — Clamp<br>
    d — Delete
  </div>
  <script src="app.js"></script>
</body>
</html>
