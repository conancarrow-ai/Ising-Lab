<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ising Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; user-select: none; background: #f5f5f0; }
    canvas { display: block; }

    #legend {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font: 12px/1.6 monospace;
      padding: 10px 14px;
      border-radius: 4px;
      pointer-events: none;
    }

    #legend strong {
      color: #ff9944;
    }

    .mode-active {
      color: #ff6600;
    }

    #controls {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      font: 12px/1.6 monospace;
      padding: 8px 12px;
      border-radius: 4px;
    }

    #controls-row1 {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #controls-row2 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    #color-count {
      font: 12px monospace;
      padding: 2px 4px;
      border-radius: 3px;
      border: 1px solid #888;
      background: #333;
      color: #fff;
    }

    #coloring-check {
      font: 11px monospace;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #888;
      background: #444;
      color: #fff;
      cursor: pointer;
    }

    #coloring-check:hover {
      background: #555;
    }

    #controls-row3 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    #history-size {
      font: 12px monospace;
      width: 40px;
      padding: 2px 4px;
      border-radius: 3px;
      border: 1px solid #888;
      background: #333;
      color: #fff;
      text-align: center;
    }

    #context-menu {
      position: fixed;
      background: rgba(20, 20, 20, 0.95);
      color: #fff;
      font: 12px/1.4 monospace;
      padding: 4px 0;
      border-radius: 4px;
      border: 1px solid #555;
      z-index: 200;
      min-width: 160px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .menu-item {
      padding: 4px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    .menu-item:hover {
      background: #ff6600;
    }

    .menu-item.disabled {
      color: #777;
      cursor: default;
    }

    .menu-item.disabled:hover {
      background: transparent;
    }

    .menu-key {
      color: #ff9944;
    }

    .menu-item.disabled .menu-key {
      color: #555;
    }

    .menu-sep {
      height: 1px;
      background: #444;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div id="controls-row1">
      <label for="color-count">Colors:</label>
      <select id="color-count">
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>
    <div id="controls-row2">
      <span id="coloring-status">&#x26A0;&#xFE0F;</span>
      <button id="coloring-check">Coloring?</button>
    </div>
    <div id="controls-row3">
      <label for="history-size">History:</label>
      <input id="history-size" type="text" value="30">
    </div>
  </div>
  <div id="legend">
    <strong>Modes</strong><br>
    <span data-mode="NEW_NODE">1 — Place</span><br>
    <span data-mode="LASSO_SELECT">2 — Lasso</span><br>
    <span data-mode="CLICK_SELECT">3 — Select</span><br>
    <br>
    <strong>Display</strong><br>
    <span data-display="COLORS">c — Colors</span><br>
    <span data-display="STATE">s — State</span><br>
    <span data-display="MODEL">m — Model</span><br>
    <br>
    <strong>Actions</strong><br>
    <span id="q-label">q — Color</span><br>
    w — Connect<br>
    e — Hide<br>
    r — Clamp<br>
    a — Clean up<br>
    d — Delete<br>
    <span id="update-label" style="display:none">&rarr; — Update<br>! — Random init<br>@ — Wipe</span>
  </div>
  <script src="app.js"></script>
</body>
</html>
